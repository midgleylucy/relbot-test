name: RelBot - Generate Release Notes on PR Merge

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to process'
        required: false

jobs:
  relbot-generate-notes:
    # Only run when PR is merged (not just closed)
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Hard timeout to prevent runaway costs
    concurrency:
      group: relbot-${{ github.event.pull_request.number || github.event.inputs.pr_number || 'manual' }}
      cancel-in-progress: false  # Don't cancel if multiple PRs merge simultaneously
    permissions:
      contents: read
      pull-requests: read
      issues: write  # For creating review issues if needed
    
    steps:
      - name: Checkout RelBot repository
        uses: actions/checkout@v4
        with:
          repository: 'moneyforward/relbot'
          path: relbot
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Download RelBot dependencies
        working-directory: relbot
        run: go mod download
      
      - name: Build relbot_generate
        working-directory: relbot
        run: go build -o ../relbot_generate ./cmd/relbot_generate
      
      - name: Build create_review_issue
        working-directory: relbot
        run: go build -o ../create_review_issue ./cmd/create_review_issue
      
      - name: Determine PR number
        id: pr_info
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            PR_NUMBER="${{ github.event.inputs.pr_number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
          echo "Processing PR #${PR_NUMBER}"
      
      - name: Generate Release Notes Draft
        id: generate
        timeout-minutes: 8  # Step timeout (less than job timeout)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL || 'claude-sonnet-4-5' }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_RELEASE_NOTES_DATABASE_ID }}
          REPOSITORY: ${{ github.repository }}
          ASANA_API_KEY: ${{ secrets.ASANA_API_KEY }}
          # Notion property names (configure per repo)
          NOTION_PROPERTY_TITLE: ${{ secrets.NOTION_PROPERTY_TITLE || 'Title' }}
          NOTION_PROPERTY_RELEASE_DATE: ${{ secrets.NOTION_PROPERTY_RELEASE_DATE || 'Release Date' }}
          NOTION_PROPERTY_TYPE: ${{ secrets.NOTION_PROPERTY_TYPE || 'Type' }}
          NOTION_PROPERTY_SPRINT: ${{ secrets.NOTION_PROPERTY_SPRINT || 'Sprint' }}
          NOTION_PROPERTY_TICKET: ${{ secrets.NOTION_PROPERTY_TICKET || 'Ticket' }}
          NOTION_PROPERTY_PRODUCT: ${{ secrets.NOTION_PROPERTY_PRODUCT }}
          # Product value (per repo: "Web", "Mobile App", or "aweb")
          NOTION_PRODUCT_VALUE: ${{ secrets.NOTION_PRODUCT_VALUE }}
        run: |
          ./relbot_generate \
            -repo "${{ github.repository }}" \
            -pr-number "${{ steps.pr_info.outputs.pr_number }}" \
            -output-format notion \
            -create-draft
          EXIT_CODE=$?
          # Note: relbot_generate writes outputs directly to GITHUB_OUTPUT via appendToGitHubOutput()
          # Outputs (draft_created, draft_url, notes_preview) are automatically available
          # Exit code is captured for logging but won't fail the step due to continue-on-error
          exit $EXIT_CODE
        continue-on-error: true  # Don't fail if PR is not user-facing
      
      - name: Create Review Issue
        if: steps.generate.outputs.draft_created == 'true'
        timeout-minutes: 2  # Quick step, short timeout
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./create_review_issue \
            -repo "${{ github.repository }}" \
            -pr-number "${{ steps.pr_info.outputs.pr_number }}" \
            -draft-url "${{ steps.generate.outputs.draft_url }}" \
            -notes-preview "${{ steps.generate.outputs.notes_preview }}"
        continue-on-error: true  # Don't fail workflow if issue creation fails
