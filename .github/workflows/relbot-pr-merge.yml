name: RelBot - Generate Release Notes on PR Merge

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to process'
        required: false

jobs:
  relbot-generate-notes:
    # Only run when PR is merged (not just closed)
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Hard timeout to prevent runaway costs
    concurrency:
      group: relbot-${{ github.event.pull_request.number || github.event.inputs.pr_number || 'manual' }}
      cancel-in-progress: false  # Don't cancel if multiple PRs merge simultaneously
    permissions:
      contents: read
      pull-requests: read
    
    steps:
      - name: Checkout RelBot repository
        uses: actions/checkout@v4
        with:
          repository: 'moneyforward/relbot'
          path: relbot
          # Use PAT if relbot repo is private, otherwise GITHUB_TOKEN
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Download RelBot dependencies
        working-directory: relbot
        run: go mod download
      
      - name: Build relbot_generate
        working-directory: relbot
        run: go build -o ../relbot_generate ./cmd/relbot_generate
      
      - name: Determine PR number
        id: pr_info
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            PR_NUMBER="${{ github.event.inputs.pr_number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
          echo "Repository: ${{ github.repository }}"
          echo "Processing PR #${PR_NUMBER}"
      
      - name: Generate Release Notes Draft
        id: generate
        timeout-minutes: 8  # Step timeout (less than job timeout)
        env:
          # Use PAT if provided, otherwise fall back to GITHUB_TOKEN
          # PAT is needed for private repos or cross-org access
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL || 'claude-sonnet-4-5' }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_RELEASE_NOTES_DATABASE_ID }}
          REPOSITORY: ${{ github.repository }}
          ASANA_API_KEY: ${{ secrets.ASANA_API_KEY }}
          # Notion property names (configure per repo)
          NOTION_PROPERTY_TITLE: ${{ secrets.NOTION_PROPERTY_TITLE || 'Title' }}
          NOTION_PROPERTY_RELEASE_DATE: ${{ secrets.NOTION_PROPERTY_RELEASE_DATE || 'Release Date' }}
          NOTION_PROPERTY_TYPE: ${{ secrets.NOTION_PROPERTY_TYPE || 'Type' }}
          NOTION_PROPERTY_SPRINT: ${{ secrets.NOTION_PROPERTY_SPRINT || 'Sprint' }}
          NOTION_PROPERTY_TICKET: ${{ secrets.NOTION_PROPERTY_TICKET || 'Ticket' }}
          NOTION_PROPERTY_PRODUCT: ${{ secrets.NOTION_PROPERTY_PRODUCT }}
          NOTION_PROPERTY_STATUS: ${{ secrets.NOTION_PROPERTY_STATUS || 'Status' }}
          NOTION_STATUS_UNREVIEWED: ${{ secrets.NOTION_STATUS_UNREVIEWED || 'Unreviewed' }}
          # Product value (per repo: "Web", "Mobile App", or "aweb")
          NOTION_PRODUCT_VALUE: ${{ secrets.NOTION_PRODUCT_VALUE }}
        run: |
          ./relbot_generate \
            -repo "${{ github.repository }}" \
            -pr-number "${{ steps.pr_info.outputs.pr_number }}" \
            -output-format notion \
            -create-draft
          EXIT_CODE=$?
          # Note: relbot_generate writes outputs directly to GITHUB_OUTPUT via appendToGitHubOutput()
          # Outputs (draft_created, draft_url, notes_preview) are automatically available
          # Exit code is captured for logging but won't fail the step due to continue-on-error
          exit $EXIT_CODE
        continue-on-error: true  # Don't fail if PR is not user-facing
      
      - name: Notify Slack
        if: steps.generate.outputs.draft_created == 'true' && secrets.SLACK_WEBHOOK_URL != ''
        timeout-minutes: 1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DRAFT_URL: ${{ steps.generate.outputs.draft_url }}
          NOTES_PREVIEW: ${{ steps.generate.outputs.notes_preview }}
          PR_URL: https://github.com/${{ github.repository }}/pull/${{ steps.pr_info.outputs.pr_number }}
        run: |
          payload=$(jq -n \
            --arg draft_url "$DRAFT_URL" \
            --arg notes_preview "$NOTES_PREVIEW" \
            --arg pr_url "$PR_URL" \
            '{
              "blocks": [
                { "type": "header", "text": { "type": "plain_text", "text": "📝 New Release Note Draft", "emoji": true } },
                { "type": "section", "text": { "type": "mrkdwn", "text": "A release note draft has been created. Please review in Notion." } },
                { "type": "section", "text": { "type": "mrkdwn", "text": ("*Preview:*\n" + $notes_preview) } },
                {
                  "type": "actions",
                  "elements": [
                    { "type": "button", "text": { "type": "plain_text", "text": "Review in Notion", "emoji": true }, "url": $draft_url },
                    { "type": "button", "text": { "type": "plain_text", "text": "View PR", "emoji": true }, "url": $pr_url }
                  ]
                }
              ]
            }')
          curl -sS -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"
        continue-on-error: true  # Don't fail workflow if Slack notification fails
